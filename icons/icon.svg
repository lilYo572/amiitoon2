<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="512" height="512" rx="110" ry="110"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedSquare)">
    <!-- Background -->
    <rect x="0" y="0" width="512" height="512" fill="#0C0A1A"/>

    <!-- Ink splat background accents -->
    <circle cx="80" cy="430" r="120" fill="#3D6FFF" opacity="0.18"/>
    <circle cx="460" cy="90" r="100" fill="#F9E45B" opacity="0.15"/>

    <!-- Bottom ink puddle -->
    <ellipse cx="256" cy="430" rx="150" ry="36" fill="#1A1530"/>
    <ellipse cx="180" cy="445" rx="26" ry="14" fill="#1A1530"/>
    <ellipse cx="345" cy="448" rx="20" ry="11" fill="#1A1530"/>

    <!-- Squid body -->
    <g>
      <!-- Tentacles (yellow, splatoon 3 theme) -->
      <path d="M 175 250 Q 140 320 150 390 Q 155 410 175 405 Q 188 400 182 380 Q 172 330 200 280 Z" fill="#F9E45B"/>
      <path d="M 215 270 Q 195 345 205 415 Q 210 432 228 425 Q 240 418 232 398 Q 218 350 240 295 Z" fill="#F9E45B"/>
      <path d="M 297 270 Q 317 345 307 415 Q 302 432 284 425 Q 272 418 280 398 Q 294 350 272 295 Z" fill="#F9E45B"/>
      <path d="M 337 250 Q 372 320 362 390 Q 357 410 337 405 Q 324 400 330 380 Q 340 330 312 280 Z" fill="#F9E45B"/>

      <!-- Head -->
      <ellipse cx="256" cy="220" rx="115" ry="105" fill="#F9E45B"/>

      <!-- Head shading -->
      <ellipse cx="220" cy="190" rx="40" ry="35" fill="#FFF1A8" opacity="0.5"/>

      <!-- Eyes -->
      <ellipse cx="215" cy="225" rx="26" ry="30" fill="#17132E"/>
      <ellipse cx="297" cy="225" rx="26" ry="30" fill="#17132E"/>
      <circle cx="222" cy="215" r="8" fill="#FFFFFF"/>
      <circle cx="304" cy="215" r="8" fill="#FFFFFF"/>

      <!-- Mask/goggles band (blue accent, splatoon 3) -->
      <path d="M 145 195 Q 256 165 367 195 L 367 215 Q 256 188 145 215 Z" fill="#3D6FFF"/>
    </g>
  </g>

  <!-- Subtle border -->
  <rect x="3" y="3" width="506" height="506" rx="108" ry="108" fill="none" stroke="#3D6FFF" stroke-width="4" opacity="0.4"/>
</svg>
